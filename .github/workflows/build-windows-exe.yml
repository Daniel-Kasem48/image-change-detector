name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "video_compare_desktop.py"
      - "requirements.txt"
      - "requirements-desktop.txt"
      - "config.desktop.yaml"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile `
            --name VideoChangeDetector `
            --collect-all PySide6 `
            --collect-all cv2 `
            --add-data "config.yaml;." `
            --add-data "config.desktop.yaml;." `
            video_compare_desktop.py

      - name: Build DEBUG EXE (console)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --console --onefile `
            --name VideoChangeDetector_debug `
            --collect-all PySide6 `
            --collect-all cv2 `
            --add-data "config.yaml;." `
            --add-data "config.desktop.yaml;." `
            video_compare_desktop.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoChangeDetector-windows-exe
          path: |
            dist/VideoChangeDetector.exe
            dist/VideoChangeDetector_debug.exe
